name: Android Build & Release

on:
  push:
    branches: [ main, master, '**' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4. Create local.properties so Gradle can find the SDK
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # 5. Install Gradle and generate the wrapper jar
      - name: Generate Gradle wrapper
        run: |
          # Install gradle via apt
          sudo apt-get install -y gradle
          cd android
          gradle wrapper --gradle-version 8.5 --distribution-type bin
          chmod +x gradlew

      # 6. Set up Gradle (caching, build scan, etc.)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 7. Build the debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      # 8. Upload APK as downloadable artifact (retained 30 days)
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
